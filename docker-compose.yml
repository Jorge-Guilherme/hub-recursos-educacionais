version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hub_recursos
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub_user -d hub_recursos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./source
      dockerfile: Dockerfile
    container_name: hub_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./source:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: hub_recursos
      DB_USERNAME: hub_user
      DB_PASSWORD: hub_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hub_network

  frontend:
    build:
      context: ./themes
      dockerfile: Dockerfile
    container_name: hub_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./themes:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - hub_network

networks:
  hub_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
