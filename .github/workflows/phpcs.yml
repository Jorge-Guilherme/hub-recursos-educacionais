name: PHP_CodeSniffer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/phpcs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/phpcs.yml'

jobs:
  phpcs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pgsql, pdo_pgsql
          coverage: none
          tools: phpcs

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: source/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Instalar dependências
        working-directory: ./source
        run: |
          composer install --prefer-dist --no-progress --no-interaction
          composer require --dev squizlabs/php_codesniffer

      - name: Executar PHPCS
        working-directory: ./source
        run: |
          ./vendor/bin/phpcs --standard=PSR12 app/ --report=full

      - name: Enviar comentário no PR (se falhar)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ O PHPCS encontrou violações de padrões de código. Verifique os logs da Action para mais detalhes.'
            })
