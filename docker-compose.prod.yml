version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hub_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hub_recursos}
      POSTGRES_USER: ${DB_USERNAME:-hub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hub_user} -d ${DB_DATABASE:-hub_recursos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Não expõe porta para segurança

  backend:
    build:
      context: ./source
      dockerfile: Dockerfile.prod
    container_name: hub_backend_prod
    restart: always
    working_dir: /var/www
    volumes:
      - ./source:/var/www
      - backend_vendor:/var/www/vendor
      - backend_storage:/var/www/storage
    expose:
      - "9000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-hub_recursos}
      DB_USERNAME: ${DB_USERNAME:-hub_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hub_network

  frontend:
    build:
      context: ./themes
      dockerfile: Dockerfile.prod
    container_name: hub_frontend_prod
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - hub_network

  nginx:
    image: nginx:alpine
    container_name: hub_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./source/public:/var/www/public:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hub_network

networks:
  hub_network:
    driver: bridge

volumes:
  postgres_data:
  backend_vendor:
    driver: local
  backend_storage:
    driver: local
  frontend_dist:
    driver: local
    driver: local
