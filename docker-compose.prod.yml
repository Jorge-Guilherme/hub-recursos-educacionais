version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hub_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hub_recursos}
      POSTGRES_USER: ${DB_USERNAME:-hub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hub_user} -d ${DB_DATABASE:-hub_recursos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./source
      dockerfile: Dockerfile.prod
    container_name: hub_backend_prod
    restart: always
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    expose:
      - "9000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-hub_recursos}
      DB_USERNAME: ${DB_USERNAME:-hub_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hub_network

  nginx:
    image: nginx:alpine
    container_name: hub_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./source/public:/var/www/public
      - ./themes/dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - hub_network

networks:
  hub_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
